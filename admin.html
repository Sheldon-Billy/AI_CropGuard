<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel — CropGuard AI</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>" />
  <style>
    :root {
      --green-dark: #1a4a1a; --green-mid: #2d7a2d; --green-light: #4caf50;
      --green-pale: #a8d5a2; --white: #fff; --cream: #f5f0e8;
      --text-dark: #1c2b1c; --text-mid: #3d5a3d; --shadow: rgba(26,74,26,0.15);
      --font: 'Segoe UI', system-ui, sans-serif;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: var(--font); background: #f0f7f0; color: var(--text-dark); }

    /* TOPBAR */
    .topbar {
      background: linear-gradient(135deg, #071a07, #1a4a1a, #2d7a2d);
      padding: 0 2rem; height: 64px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 2px 16px rgba(0,0,0,0.3);
    }
    .topbar-logo { color: #fff; font-size: 1.2rem; font-weight: 800; text-decoration: none; }
    .topbar-logo span { color: var(--green-pale); }
    .topbar-right { display: flex; align-items: center; gap: 1rem; }
    .topbar-user { color: rgba(255,255,255,0.8); font-size: 0.88rem; }
    .btn-logout {
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
      color: #fff; padding: 0.4rem 1rem; border-radius: 8px;
      cursor: pointer; font-size: 0.82rem; transition: background 0.2s;
    }
    .btn-logout:hover { background: rgba(255,255,255,0.2); }

    /* LAYOUT */
    .admin-layout { display: flex; min-height: calc(100vh - 64px); }

    /* SIDEBAR */
    .sidebar {
      width: 220px; flex-shrink: 0;
      background: var(--white); border-right: 2px solid #c8e6c9;
      padding: 1.5rem 0;
    }
    .sidebar-item {
      display: flex; align-items: center; gap: 0.7rem;
      padding: 0.75rem 1.5rem; cursor: pointer;
      color: var(--text-mid); font-size: 0.9rem; font-weight: 500;
      transition: background 0.15s, color 0.15s; border-left: 3px solid transparent;
    }
    .sidebar-item:hover { background: #f0f7f0; color: var(--green-dark); }
    .sidebar-item.active { background: #e8f5e9; color: var(--green-dark); font-weight: 700; border-left-color: var(--green-light); }
    .sidebar-item svg { width: 18px; height: 18px; stroke: currentColor; flex-shrink: 0; }

    /* MAIN */
    .admin-main { flex: 1; padding: 2rem; overflow-y: auto; }

    /* STATS */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1.2rem; margin-bottom: 2rem; }
    .stat-card {
      background: var(--white); border-radius: 16px; padding: 1.5rem;
      border: 2px solid #c8e6c9; box-shadow: 0 2px 12px var(--shadow);
      text-align: center;
    }
    .stat-card .num { font-size: 2.2rem; font-weight: 900; color: var(--green-dark); line-height: 1; }
    .stat-card .lbl { font-size: 0.78rem; color: var(--text-mid); text-transform: uppercase; letter-spacing: 1px; margin-top: 0.4rem; }

    /* SECTION */
    .admin-section { display: none; }
    .admin-section.active { display: block; }
    .section-title { font-size: 1.3rem; font-weight: 800; color: var(--green-dark); margin-bottom: 1.2rem; }

    /* TABLE */
    .table-wrap { background: var(--white); border-radius: 16px; border: 2px solid #c8e6c9; overflow: hidden; box-shadow: 0 2px 12px var(--shadow); }
    table { width: 100%; border-collapse: collapse; }
    thead { background: linear-gradient(135deg, #0f2b0f, #1a4a1a); }
    thead th { color: #fff; padding: 0.9rem 1rem; text-align: left; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }
    tbody tr { border-bottom: 1px solid #e8f5e9; transition: background 0.15s; }
    tbody tr:hover { background: #f0f7f0; }
    tbody td { padding: 0.8rem 1rem; font-size: 0.85rem; color: var(--text-dark); }
    .badge { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 10px; font-size: 0.72rem; font-weight: 700; }
    .badge-admin { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
    .badge-farmer { background: #e3f2fd; color: #1565c0; border: 1px solid #90caf9; }
    .badge-fungal { background: #e8f5e9; color: #2e7d32; }
    .badge-bacterial { background: #fff3e0; color: #e65100; }
    .badge-viral { background: #fce4ec; color: #c62828; }
    .btn-promote {
      background: var(--green-light); color: #fff; border: none;
      padding: 0.3rem 0.8rem; border-radius: 6px; font-size: 0.75rem;
      cursor: pointer; transition: background 0.2s;
    }
    .btn-promote:hover { background: var(--green-mid); }

    /* LOADING */
    .loading-msg { text-align: center; padding: 3rem; color: var(--text-mid); font-size: 0.9rem; }

    /* SEARCH */
    .table-toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; flex-wrap: wrap; gap: 0.8rem; }
    .search-input {
      border: 2px solid #c8e6c9; border-radius: 10px; padding: 0.55rem 1rem;
      font-size: 0.88rem; outline: none; width: 260px; font-family: var(--font);
      transition: border-color 0.2s;
    }
    .search-input:focus { border-color: var(--green-light); }
    .record-count { font-size: 0.82rem; color: var(--text-mid); }
  </style>
</head>
<body>

<div class="topbar">
  <a href="index.html" class="topbar-logo">🌿 CropGuard <span>AI</span> — Admin</a>
  <div class="topbar-right">
    <span class="topbar-user" id="adminName"></span>
    <button class="btn-logout" onclick="adminLogout()">Logout</button>
  </div>
</div>

<div class="admin-layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-item active" onclick="showSection('dashboard')">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      Dashboard
    </div>
    <div class="sidebar-item" onclick="showSection('users')">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Farmers
    </div>
    <div class="sidebar-item" onclick="showSection('predictions')">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      Predictions
    </div>
  </div>

  <!-- MAIN -->
  <div class="admin-main">

    <!-- DASHBOARD -->
    <div class="admin-section active" id="sec-dashboard">
      <div class="section-title">Dashboard Overview</div>
      <div class="stats-grid" id="statsGrid">
        <div class="stat-card"><div class="num" id="statFarmers">—</div><div class="lbl">Registered Farmers</div></div>
        <div class="stat-card"><div class="num" id="statPredictions">—</div><div class="lbl">Total Analyses</div></div>
        <div class="stat-card"><div class="num" id="statFeedback">—</div><div class="lbl">Feedback Submitted</div></div>
      </div>
    </div>

    <!-- USERS -->
    <div class="admin-section" id="sec-users">
      <div class="table-toolbar">
        <div class="section-title" style="margin:0;">Registered Farmers</div>
        <input class="search-input" id="userSearch" placeholder="Search by name or email..." oninput="filterTable('userTable', this.value)" />
      </div>
      <div class="table-wrap">
        <table id="userTable">
          <thead><tr>
            <th>#</th><th>Name</th><th>Email / Phone</th><th>Farm Location</th><th>Crops</th><th>Role</th><th>Registered</th><th>Action</th>
          </tr></thead>
          <tbody id="userTableBody"><tr><td colspan="8" class="loading-msg">Loading...</td></tr></tbody>
        </table>
      </div>
    </div>

    <!-- PREDICTIONS -->
    <div class="admin-section" id="sec-predictions">
      <div class="table-toolbar">
        <div class="section-title" style="margin:0;">All Predictions</div>
        <input class="search-input" id="predSearch" placeholder="Search by disease or farmer..." oninput="filterTable('predTable', this.value)" />
      </div>
      <div class="table-wrap">
        <table id="predTable">
          <thead><tr>
            <th>#</th><th>Farmer</th><th>Disease</th><th>Type</th><th>Crop</th><th>Feedback</th><th>Date</th>
          </tr></thead>
          <tbody id="predTableBody"><tr><td colspan="7" class="loading-msg">Loading...</td></tr></tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<script>
  const token = localStorage.getItem('cg_token');
  const user  = JSON.parse(localStorage.getItem('cg_user') || 'null');

  // Guard — admin only
  if (!token || !user || user.role !== 'admin') {
    alert('Admin access required.');
    window.location.href = 'login.html';
  }

  document.getElementById('adminName').textContent = user?.full_name || 'Admin';

  function adminLogout() {
    localStorage.removeItem('cg_token');
    localStorage.removeItem('cg_user');
    window.location.href = 'login.html';
  }

  function showSection(name) {
    document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.sidebar-item').forEach(s => s.classList.remove('active'));
    document.getElementById('sec-' + name).classList.add('active');
    event.currentTarget.classList.add('active');
    if (name === 'users') loadUsers();
    if (name === 'predictions') loadPredictions();
  }

  const headers = { 'Authorization': 'Bearer ' + token };

  // LOAD STATS
  async function loadStats() {
    try {
      const res  = await fetch('/api/admin/stats', { headers });
      const data = await res.json();
      document.getElementById('statFarmers').textContent     = data.total_farmers ?? '—';
      document.getElementById('statPredictions').textContent = data.total_predictions ?? '—';
      document.getElementById('statFeedback').textContent    = data.total_feedback ?? '—';
    } catch { }
  }

  // LOAD USERS
  async function loadUsers() {
    const tbody = document.getElementById('userTableBody');
    tbody.innerHTML = '<tr><td colspan="8" class="loading-msg">Loading...</td></tr>';
    try {
      const res  = await fetch('/api/admin/users', { headers });
      const data = await res.json();
      if (!data.users?.length) { tbody.innerHTML = '<tr><td colspan="8" class="loading-msg">No farmers yet.</td></tr>'; return; }
      tbody.innerHTML = data.users.map((u, i) => `
        <tr>
          <td>${i + 1}</td>
          <td><strong>${u.full_name}</strong></td>
          <td>${u.email || u.phone || '—'}</td>
          <td>${u.farm_location || '—'}</td>
          <td>${u.primary_crops || '—'}</td>
          <td><span class="badge badge-${u.role}">${u.role}</span></td>
          <td>${new Date(u.registered_at).toLocaleDateString()}</td>
          <td>${u.role !== 'admin' ? `<button class="btn-promote" onclick="promote(${u.id}, this)">Make Admin</button>` : '—'}</td>
        </tr>`).join('');
    } catch { tbody.innerHTML = '<tr><td colspan="8" class="loading-msg">Failed to load.</td></tr>'; }
  }

  // LOAD PREDICTIONS
  async function loadPredictions() {
    const tbody = document.getElementById('predTableBody');
    tbody.innerHTML = '<tr><td colspan="7" class="loading-msg">Loading...</td></tr>';
    const typeMap = { Fungal:'badge-fungal', Bacterial:'badge-bacterial', Viral:'badge-viral' };
    try {
      const res  = await fetch('/api/admin/predictions', { headers });
      const data = await res.json();
      if (!data.predictions?.length) { tbody.innerHTML = '<tr><td colspan="7" class="loading-msg">No predictions yet.</td></tr>'; return; }
      tbody.innerHTML = data.predictions.map((p, i) => `
        <tr>
          <td>${i + 1}</td>
          <td>${p.full_name}<br><small style="color:#888">${p.email || ''}</small></td>
          <td><strong>${p.disease_name || '—'}</strong></td>
          <td><span class="badge ${typeMap[p.disease_type] || 'badge-farmer'}">${p.disease_type || '—'}</span></td>
          <td>${p.crop_type || '—'}</td>
          <td>${p.feedback ? `<span class="badge badge-${p.feedback === 'correct' ? 'admin' : 'bacterial'}">${p.feedback}</span>` : '—'}</td>
          <td>${new Date(p.created_at).toLocaleDateString()}</td>
        </tr>`).join('');
    } catch { tbody.innerHTML = '<tr><td colspan="7" class="loading-msg">Failed to load.</td></tr>'; }
  }

  // PROMOTE USER
  async function promote(id, btn) {
    if (!confirm('Promote this user to admin?')) return;
    btn.textContent = '...'; btn.disabled = true;
    try {
      await fetch(`/api/admin/promote/${id}`, { method: 'POST', headers });
      btn.textContent = 'Done'; btn.style.background = '#2d7a2d';
    } catch { btn.textContent = 'Failed'; btn.disabled = false; }
  }

  // FILTER TABLE
  function filterTable(tableId, query) {
    const rows = document.querySelectorAll(`#${tableId} tbody tr`);
    const q = query.toLowerCase();
    rows.forEach(row => {
      row.style.display = row.textContent.toLowerCase().includes(q) ? '' : 'none';
    });
  }

  // INIT
  loadStats();
</script>
</body>
</html>
