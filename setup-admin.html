<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Setup Admin — CropGuard AI</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #1a4a1a, #2d7a2d);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .setup-box {
      background: white;
      border-radius: 20px;
      padding: 2.5rem;
      max-width: 450px;
      width: 100%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    h1 {
      color: #1a4a1a;
      font-size: 1.8rem;
      margin-bottom: 0.5rem;
      text-align: center;
    }
    .subtitle {
      color: #666;
      text-align: center;
      margin-bottom: 2rem;
      font-size: 0.9rem;
    }
    .warning {
      background: #fff3cd;
      border: 2px solid #ffc107;
      border-radius: 10px;
      padding: 1rem;
      margin-bottom: 1.5rem;
      font-size: 0.85rem;
      color: #856404;
    }
    .warning strong { display: block; margin-bottom: 0.3rem; }
    label {
      display: block;
      color: #1a4a1a;
      font-weight: 600;
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
    }
    input {
      width: 100%;
      padding: 0.8rem;
      border: 2px solid #c8e6c9;
      border-radius: 10px;
      font-size: 1rem;
      font-family: inherit;
      margin-bottom: 1.5rem;
      transition: border-color 0.2s;
    }
    input:focus {
      outline: none;
      border-color: #4caf50;
    }
    button {
      width: 100%;
      background: linear-gradient(135deg, #2d7a2d, #4caf50);
      color: white;
      border: none;
      padding: 1rem;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s;
    }
    button:hover { transform: translateY(-2px); }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
    }
    .result {
      margin-top: 1.5rem;
      padding: 1rem;
      border-radius: 10px;
      font-size: 0.9rem;
      display: none;
    }
    .result.success {
      background: #d4edda;
      color: #155724;
      border: 2px solid #c3e6cb;
    }
    .result.error {
      background: #f8d7da;
      color: #721c24;
      border: 2px solid #f5c6cb;
    }
    .back-link {
      text-align: center;
      margin-top: 1.5rem;
    }
    .back-link a {
      color: #2d7a2d;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>

<div class="setup-box">
  <h1>🔐 Setup Admin</h1>
  <p class="subtitle">One-time admin account setup</p>

  <div class="warning">
    <strong>⚠️ Security Notice</strong>
    This page should be deleted after use. It allows anyone to promote any user to admin.
  </div>

  <form id="setupForm" onsubmit="handleSetup(event)">
    <label for="email">Enter your registered email:</label>
    <input 
      type="email" 
      id="email" 
      placeholder="your@email.com" 
      required 
      autocomplete="email"
    />

    <button type="submit" id="submitBtn">Make Me Admin</button>
  </form>

  <div class="result" id="result"></div>

  <div class="back-link">
    <a href="login.html">← Back to Login</a>
  </div>
</div>

<script>
  async function handleSetup(e) {
    e.preventDefault();
    
    const email = document.getElementById('email').value.trim();
    const btn = document.getElementById('submitBtn');
    const result = document.getElementById('result');
    
    btn.disabled = true;
    btn.textContent = 'Processing...';
    result.style.display = 'none';

    try {
      const res = await fetch('/api/setup-admin', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });

      const data = await res.json();

      if (res.ok) {
        result.className = 'result success';
        result.textContent = `✅ Success! ${data.user.full_name} is now an admin. Please log out and log back in.`;
        result.style.display = 'block';
        
        setTimeout(() => {
          window.location.href = 'login.html';
        }, 3000);
      } else {
        result.className = 'result error';
        result.textContent = `❌ ${data.error}`;
        result.style.display = 'block';
      }
    } catch (err) {
      result.className = 'result error';
      result.textContent = `❌ Connection error: ${err.message}`;
      result.style.display = 'block';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Make Me Admin';
    }
  }
</script>

</body>
</html>
